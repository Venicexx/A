# 科捷物流每日天气提醒
# 由 cron-job.org 在 06:00 触发（比 GitHub 内置 cron 更准时）

name: 🌤️ 每日天气提醒

on:
  workflow_dispatch:
  repository_dispatch:
    types: [weather-reminder]

jobs:
  weather:
    name: 获取天气并推送
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行天气推送
        run: python scf/index.py
