# 企微每日推送 — GitHub Actions 定时任务
# 每天北京时间 09:00 自动推送，支持手动触发
name: 📮 企微每日推送

on:
  # ─── 定时触发 ────────────────────────────
  # 北京时间 09:00（UTC 01:00），每天一次
  schedule:
    - cron: '0 1 * * *'

  # ─── 手动触发（支持自定义消息）───────────
  workflow_dispatch:
    inputs:
      message:
        description: '要推送的消息内容'
        required: false
        default: ''

jobs:
  push:
    name: 发送企微消息
    runs-on: ubuntu-latest
    steps:
      - name: 确定推送内容
        id: content
        run: |
          # 优先使用手动输入的消息，否则使用默认提醒
          if [ -n "${{ github.event.inputs.message }}" ]; then
            MSG="${{ github.event.inputs.message }}"
          else
            # ─── 修改这里改变每日默认消息 ────
            MSG="⏰ 每日提醒\n\n今日运营数据请及时汇总，如有异常请及时反馈。"
          fi
          echo "msg=$MSG" >> "$GITHUB_OUTPUT"

      - name: 推送到企微
        run: |
          MSG="${{ steps.content.outputs.msg }}"

          # 生成 JSON（用文件传递，避免中文编码问题）
          echo "{\"msgtype\":\"text\",\"text\":{\"content\":\"$MSG\"}}" > /tmp/wechat.json

          RESP=$(curl -s -X POST "${{ secrets.WECHAT_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json; charset=utf-8' \
            --data-binary @/tmp/wechat.json)

          echo "企微返回: $RESP"

          # 非 0 即失败，工作流会标红
          if echo "$RESP" | grep -q '"errcode":0'; then
            echo "✅ 推送成功"
          else
            echo "❌ 推送失败: $RESP"
            exit 1
          fi
